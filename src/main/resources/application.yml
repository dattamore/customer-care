spring:
  application:
    name: "Customer-care"
  #datasource configurations
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=STSWorkspace2;encrypt=true;trustServerCertificate=true
    username: localdbDEV
    password: localdbDEV@749
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
  profiles:
    active: dev


server:
  port: 8080

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG


